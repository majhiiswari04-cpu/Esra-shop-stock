<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esra Shop | Premium Cosmetics</title>
    <!-- Google Fonts se ek professional font add kiya hai -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2c3e50; /* Elegant Dark Tone */
            --accent-color: #d4a373;  /* Premium Gold/Nude Tone */
            --bg-color: #f8f9fa;      /* Clean Light Background */
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #7a7a7a;
            --success-color: #2ec4b6; /* Instock Green */
            --danger-color: #e63946;  /* Out of stock Red */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* --- Header Section --- */
        header {
            background: linear-gradient(135deg, #111111, #2c3e50);
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1rem;
            color: #ccc;
            font-weight: 400;
        }

        /* --- Search Bar Container --- */
        .search-container {
            max-width: 600px;
            margin: -25px auto 40px auto;
            padding: 0 20px;
        }

        .search-container input {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            box-shadow: 0 10px 30px rgba(212, 163, 115, 0.2);
            transform: translateY(-2px);
        }

        /* --- Product Grid --- */
        .products-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        /* --- Product Card Design --- */
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Hover effect jo website ko dynamic banata hai */
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.07);
        }

        .image-container {
            width: 100%;
            height: 250px;
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Stock Status Badges */
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.instock {
            background-color: rgba(46, 196, 182, 0.15);
            color: var(--success-color);
        }

        .badge.outofstock {
            background-color: rgba(230, 57, 70, 0.15);
            color: var(--danger-color);
        }

        .product-details {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-top: auto;
            margin-bottom: 8px;
        }

        .stock-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Esra Shop</h1>
        <p>Premium Cosmetic Products Price List</p>
    </header>

    <!-- Search Input -->
    <div class="search-container">
        <input type="text" placeholder="Search product here...">
    </div>

    <!-- Products Grid Container -->
    <div class="products-grid">

        <!-- Card Example 1: In Stock -->
        <div class="product-card">
            <div class="image-container">
                <span class="badge instock">In Stock</span>
                <img src="YOUR_IMAGE_LINK_HERE" alt="Lakme Sunscreen">
            </div>
            <div class="product-details">
                <h2 class="product-title">Lakme Sunscreen</h2>
                <div class="product-price">₹395</div>
                <div class="stock-count">Available Stock: 4</div>
            </div>
        </div>

        <!-- Card Example 2: Out of Stock -->
        <div class="product-card">
            <div class="image-container">
                <span class="badge outofstock">Sold Out</span>
                <img src="YOUR_IMAGE_LINK_HERE" alt="Nivea Soft Cream">
            </div>
            <div class="product-details">
                <h2 class="product-title">Nivea Soft Cream</h2>
                <div class="product-price">₹120</div>
                <div class="stock-count">Available Stock: 0</div>
            </div>
        </div>

    </div>

</body>
</html>
